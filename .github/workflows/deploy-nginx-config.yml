name: NGINX Config Deploy

on:
  workflow_dispatch:

jobs:
  deploy-nginx:
    runs-on: ubuntu-latest

    steps:
      - name: Set variables
        run: |
          echo "PROJECT=${{ vars.PROJECT_ASTRO }}" >> $GITHUB_ENV

      - name: Generate upstream block
        run: |
          IPS="${{ vars.ASTRO_BACKEND_IPS }}"
          UPSTREAM=""
          IFS=',' read -ra ADDR <<< "$IPS"
          for ip in "${ADDR[@]}"; do
            UPSTREAM="$UPSTREAM\n    server $ip:3001;"
          done
          echo -e "$UPSTREAM" > upstream.conf

      - name: Create nginx.conf
        run: |
          cat <<EOF > nginx.conf
            user www-data;
            worker_processes auto;
            pid /run/nginx.pid;
            error_log /var/log/nginx/error.log;
            events {
                worker_connections 768;
            }
            http {
                upstream astro_backend_cluster {
            $(cat upstream.conf)
                }
                sendfile on;
                tcp_nopush on;
                types_hash_max_size 2048;            
                include /etc/nginx/mime.types;
                default_type application/octet-stream;            
                ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;            
                access_log /var/log/nginx/access.log;
                gzip on;            
                include /etc/nginx/conf.d/*.conf;
                include /etc/nginx/sites-enabled/*;
            }
          EOF

      - name: Create API server config
        run: |
          cat <<EOF > ${PROJECT}-api-server
            server {
                server_name ${{ vars.ASTRO_API_DOMAIN }};
                location / {
                    proxy_pass http://astro_backend_cluster;
                    add_header 'Access-Control-Allow-Origin' 'https://${{ vars.ASTRO_DOMAIN }}' always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                    if (\$request_method = 'OPTIONS') {
                        add_header 'Access-Control-Allow-Origin' 'https://${{ vars.ASTRO_DOMAIN }}' always;
                        add_header 'Access-Control-Max-Age' 1728000;
                        return 204;
                    }
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
          EOF

      - name: Create Frontend server config
        run: |
          cat <<EOF > ${PROJECT}-http-server
            server {
                server_name ${{ vars.ASTRO_DOMAIN }} www.${{ vars.ASTRO_DOMAIN }};
                root /var/www/html/${{vars.PROJECT_ASTRO}};
                index index.html;
                location / {
                    try_files \$uri \$uri/ /index.html;
                }
            }
          EOF

      - name: Copy configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.ASTRO_FRONTEND_SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx.conf,${{ env.PROJECT }}-api-server,${{ env.PROJECT }}-http-server"
          target: "/home/${{ vars.SERVER_USER }}/nginx-configs"

      - name: Apply configs on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ASTRO_FRONTEND_SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" nginx certbot python3-certbot-nginx -y
            sudo systemctl enable nginx
            sudo systemctl start nginx
            sudo mkdir -p /home/${{ vars.SERVER_USER }}/nginx-configs
            sudo cp  --update=none /etc/nginx/nginx.conf /etc/nginx/nginx.conf.bkp || true
            sudo mv /home/${{ vars.SERVER_USER }}/nginx-configs/nginx.conf /etc/nginx/nginx.conf
            sudo mv /home/${{ vars.SERVER_USER }}/nginx-configs/${{ env.PROJECT }}-api-server /etc/nginx/sites-available/${{ env.PROJECT }}-api-server
            sudo mv /home/${{ vars.SERVER_USER }}/nginx-configs/${{ env.PROJECT }}-http-server /etc/nginx/sites-available/${{ env.PROJECT }}-http-server
            sudo ln -sf /etc/nginx/sites-available/${{ env.PROJECT }}-api-server /etc/nginx/sites-enabled/${{ env.PROJECT }}-api-server
            sudo ln -sf /etc/nginx/sites-available/${{ env.PROJECT }}-http-server /etc/nginx/sites-enabled/${{ env.PROJECT }}-http-server
            sudo rm -f /etc/nginx/sites-enabled/default

      - name: Create/Renew certificates
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ASTRO_FRONTEND_SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo certbot --nginx -d ${{ vars.ASTRO_DOMAIN }} -d ${{ vars.ASTRO_API_DOMAIN }}  --keep-until-expiring  --non-interactive --agree-tos --email ${{ vars.ASTRO_DOMAIN_VALIDATION_EMAIL }}

      - name: restart nginx server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ASTRO_FRONTEND_SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t && sudo nginx -s reload